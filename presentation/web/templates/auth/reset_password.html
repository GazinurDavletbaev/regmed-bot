<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля — RegMed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #10a37f; font-size: 28px; }
        .logo p { color: #666; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #10a37f;
            box-shadow: 0 0 0 3px rgba(16,163,127,0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #0e8c6d; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: #10a37f; text-decoration: none; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .message.success { background: #e0f2e9; color: #10a37f; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>РЕГМЕД</h1>
            <p>Восстановление пароля</p>
        </div>
        <form id="resetForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <button type="submit">Отправить ссылку</button>
        </form>
        <div class="links">
            <a href="/auth/login-page">Вернуться ко входу</a>
        </div>
        <div id="message" class="message"></div>
    </div>
    <script>
        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });
                const data = await res.json();
                messageDiv.className = 'message success';
                messageDiv.innerText = data.message || 'Ссылка отправлена на email';
                messageDiv.style.display = 'block';
            } catch (error) {
                messageDiv.className = 'message success';
                messageDiv.innerText = 'Запрос отправлен, проверьте почту';
                messageDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
