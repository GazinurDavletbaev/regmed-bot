services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: regmed_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - C:/Users/user/.cache/huggingface:/root/.cache/huggingface   # монтируем модель
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    restart: unless-stopped